<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vibration Before/After FFT Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
        :root {
            --bg: #f6f7f4;
            --card: #ffffff;
            --ink: #1f2d2a;
            --muted: #5d6a67;
            --line: #d7ded9;
            --accent-a: #1e6f5c;
            --accent-b: #c25b3f;
            --accent-c: #2a5f9e;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 16px;
            background: radial-gradient(circle at 10% 0%, #eef2ec 0%, var(--bg) 45%, #ecefe9 100%);
            color: var(--ink);
            font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(1.2rem, 2.8vw, 1.9rem);
            letter-spacing: 0.02em;
        }

        .controls {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .controls label {
            font-weight: 600;
        }

        select {
            min-width: 180px;
            padding: 6px 8px;
            border: 1px solid #bfc9c3;
            border-radius: 8px;
            background: #fff;
        }

        code {
            background: #eef3f0;
            color: #2e4a43;
            border: 1px solid #d5e1dc;
            border-radius: 6px;
            padding: 3px 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
        }

        .panel h2 {
            margin: 0 0 10px;
            font-size: 1.05rem;
            letter-spacing: 0.02em;
        }

        .hint {
            margin: 0 0 8px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .plot {
            width: 100%;
            height: 62vh;
            min-height: 340px;
        }

        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .plot {
                height: 48vh;
                min-height: 300px;
            }
        }
    </style>
</head>
<body>
    <h1>Oscilloscope Dashboard: Before vs After Fourier Transform</h1>

    <div class="controls">
        <label for="folderSelect">Folder:</label>
        <select id="folderSelect"></select>

        <label for="fileSelect">CSV file:</label>
        <select id="fileSelect"></select>

        <code id="datasetLabel"></code>
    </div>

    <div class="grid">
        <section class="panel">
            <h2>Before Fourier Transform</h2>
            <p class="hint">Raw oscilloscope waveform from ./Vibration_results/*-20/*.csv</p>
            <div id="plotBefore" class="plot"></div>
        </section>

        <section class="panel">
            <h2>After Fourier Transform</h2>
            <p class="hint">FFT band from ./fft_results/*-20/*.csv (1550-1570 Hz)</p>
            <div id="plotAfter" class="plot"></div>
        </section>
    </div>

    <script>
        const FOLDER_FILES = {
            "30-20": [
                "30_2HZ000.csv",
                "30_3HZ000.csv",
                "30_4HZ000.csv",
                "30_5HZ   000.csv"
            ],
            "40-20": [
                "40_2HZ000.csv",
                "40_3HZ000.csv",
                "40_4HZ000.csv",
                "40_5HZ000.csv"
            ],
            "50-20": [
                "1.7HZ_50-20 000.csv",
                "2HZ_50-20 000.csv",
                "3HZ_50-20 000.csv",
                "4HZ_50-20 000.csv",
                "5HZ_50-20 000.csv"
            ],
            "60-20": [
                "60_2HZ   000.csv",
                "60_3HZ   000.csv",
                "60_4HZ   000.csv",
                "60_5HZ   000.csv"
            ],
            "70-20": [
                "70_2HZ   000.csv",
                "70_3HZ   000.csv",
                "70_41HZ   000.csv",
                "70_4HZ   000.csv",
                "70_5HZ   000.csv"
            ]
        };

        const folderSelect = document.getElementById("folderSelect");
        const fileSelect = document.getElementById("fileSelect");
        const datasetLabel = document.getElementById("datasetLabel");

        function stemFromFileName(fileName) {
            return fileName.replace(/\.csv$/i, "");
        }

        function parseCsvLine(line) {
            const out = [];
            let cur = "";
            let inQuote = false;

            for (let i = 0; i < line.length; i += 1) {
                const ch = line[i];
                if (ch === '"') {
                    inQuote = !inQuote;
                } else if (ch === "," && !inQuote) {
                    out.push(cur);
                    cur = "";
                } else {
                    cur += ch;
                }
            }
            out.push(cur);
            return out.map((v) => v.trim());
        }

        function toNum(v) {
            if (v === undefined || v === null) return Number.NaN;
            const clean = String(v).replace(/^"|"$/g, "").trim();
            if (clean === "") return Number.NaN;
            return Number(clean);
        }

        function parseRawCsv(text) {
            const lines = text.split(/\r?\n/).filter((line) => line.trim().length > 0);

            let sampleRate = Number.NaN;
            let hResolution = Number.NaN;
            const ch1 = [];
            const ch2 = [];
            let idx = 0;

            for (idx = 0; idx < lines.length; idx += 1) {
                const row = parseCsvLine(lines[idx]);
                const first = (row[0] || "").replace(/^"|"$/g, "").trim();

                if (first === "SampleRate") {
                    sampleRate = toNum(row[1]);
                }
                if (first === "HResolution") {
                    hResolution = toNum(row[1]);
                }

                if (first === "") {
                    break;
                }
            }

            for (; idx < lines.length; idx += 1) {
                const row = parseCsvLine(lines[idx]);
                if (!row.length || row[0] !== "") continue;

                const v1 = toNum(row[1]);
                const v2 = toNum(row[2]);
                if (!Number.isFinite(v1)) continue;
                ch1.push(v1);
                ch2.push(Number.isFinite(v2) ? v2 : Number.NaN);
            }

            if (!Number.isFinite(sampleRate) && Number.isFinite(hResolution) && hResolution > 0) {
                sampleRate = 1 / hResolution;
            }

            if (!Number.isFinite(sampleRate) || sampleRate <= 0) {
                throw new Error("Sample rate not found in raw CSV.");
            }

            const x = ch1.map((_, i) => i / sampleRate);
            return { x, ch1, ch2 };
        }

        function parseFftCsv(text) {
            const lines = text.split(/\r?\n/).filter((line) => line.trim().length > 0);
            if (lines.length < 2) {
                throw new Error("FFT CSV has no data rows.");
            }

            const header = parseCsvLine(lines[0]);
            const hasCh2 = header.includes("amplitude_ch2");
            const frequency = [];
            const amp1 = [];
            const amp2 = [];

            for (let i = 1; i < lines.length; i += 1) {
                const row = parseCsvLine(lines[i]);
                const f = toNum(row[0]);
                const a1 = toNum(row[1]);
                const a2 = toNum(row[2]);
                if (!Number.isFinite(f) || !Number.isFinite(a1)) continue;
                frequency.push(f);
                amp1.push(a1);
                amp2.push(Number.isFinite(a2) ? a2 : Number.NaN);
            }

            return { frequency, amp1, amp2: hasCh2 ? amp2 : null };
        }

        async function loadText(path) {
            // Primary attempt with encoded path.
            try {
                const res = await fetch(path);
                if (res.ok) {
                    return await res.text();
                }
            } catch (_) {
                // Try a plain path fallback next.
            }

            // Fallback: decode URL-encoded path in case server expects plain spacing.
            const plainPath = decodeURIComponent(path);
            try {
                const res2 = await fetch(plainPath);
                if (res2.ok) {
                    return await res2.text();
                }
                throw new Error(`Failed to load ${path} (${res2.status})`);
            } catch (err) {
                if (window.location.protocol === "file:") {
                    throw new Error(
                        "Browser blocks local fetch on file://. Start a local server: python3 -m http.server 8000, then open http://localhost:8000/interactive_dashboard.html"
                    );
                }
                throw err;
            }
        }

        function buildPaths(folder, fileName) {
            const encodedFile = encodeURIComponent(fileName);
            const rawPath = `./Vibration_results/${folder}/${encodedFile}`;
            const fftPath = `./fft_results/${folder}/${encodeURIComponent(stemFromFileName(fileName) + ".csv")}`;
            return { rawPath, fftPath };
        }

        function renderBefore(raw, fileName) {
            const traces = [
                {
                    x: raw.x,
                    y: raw.ch1,
                    mode: "lines",
                    name: "CH1",
                    line: { width: 1.4, color: "#c25b3f" }
                },
                {
                    x: raw.x,
                    y: raw.ch2,
                    mode: "lines",
                    name: "CH2",
                    line: { width: 1.4, color: "#1e6f5c" }
                }
            ];

            Plotly.react("plotBefore", traces, {
                title: `Raw Signal: ${fileName}`,
                xaxis: { title: "Time (s)" },
                yaxis: { title: "Voltage (V)" },
                hovermode: "x unified",
                legend: { orientation: "h" },
                margin: { l: 60, r: 20, t: 50, b: 55 }
            }, { responsive: true });
        }

        function renderAfter(fft, fileName) {
            const traces = [
                {
                    x: fft.frequency,
                    y: fft.amp1,
                    mode: "lines",
                    name: "Amplitude CH1",
                    line: { width: 1.6, color: "#2a5f9e" }
                }
            ];

            if (fft.amp2) {
                traces.push({
                    x: fft.frequency,
                    y: fft.amp2,
                    mode: "lines",
                    name: "Amplitude CH2",
                    line: { width: 1.4, color: "#1e6f5c" }
                });
            }

            Plotly.react("plotAfter", traces, {
                title: `FFT Spectrum: ${stemFromFileName(fileName)}.csv`,
                xaxis: {
                    title: { text: "Frequency (Hz)", standoff: 26 },
                    range: [0, 10],
                    automargin: true
                },
                yaxis: { title: "Amplitude" },
                hovermode: "x unified",
                legend: {
                    orientation: "v",
                    x: 1,
                    y: 1,
                    xanchor: "right",
                    yanchor: "top",
                    bgcolor: "rgba(255, 255, 255, 0.8)"
                },
                margin: { l: 60, r: 20, t: 50, b: 78 }
            }, { responsive: true });
        }

        async function renderSelection() {
            const folder = folderSelect.value;
            const fileName = fileSelect.value;
            datasetLabel.textContent = `${folder} / ${fileName}`;

            const { rawPath, fftPath } = buildPaths(folder, fileName);
            try {
                const [rawText, fftText] = await Promise.all([loadText(rawPath), loadText(fftPath)]);
                const raw = parseRawCsv(rawText);
                const fft = parseFftCsv(fftText);
                renderBefore(raw, fileName);
                renderAfter(fft, fileName);
            } catch (err) {
                Plotly.purge("plotBefore");
                Plotly.purge("plotAfter");
                datasetLabel.textContent = `Error: ${err.message}`;
            }
        }

        function populateFolders() {
            const folders = Object.keys(FOLDER_FILES).sort();
            folderSelect.innerHTML = folders
                .map((folder) => `<option value="${folder}">${folder}</option>`)
                .join("");
        }

        function populateFiles() {
            const folder = folderSelect.value;
            const files = FOLDER_FILES[folder] || [];
            fileSelect.innerHTML = files
                .map((file) => `<option value="${file}">${file}</option>`)
                .join("");
        }

        folderSelect.addEventListener("change", async () => {
            populateFiles();
            await renderSelection();
        });

        fileSelect.addEventListener("change", async () => {
            await renderSelection();
        });

        (async function init() {
            populateFolders();
            populateFiles();
            await renderSelection();
        }());
    </script>
</body>
</html>
